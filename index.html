<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Monitor - Shortlist Fix</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .card { background: #1e293b; padding: 25px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 20px; }
        .ip-text { font-size: 32px; color: #fbbf24; font-weight: bold; font-family: monospace; display: block; margin: 10px 0; }
        .status-box { padding: 12px; border-radius: 8px; font-weight: bold; text-align: center; margin-bottom: 15px; }
        .bg-red { background: #7f1d1d; color: #fecaca; border: 1px solid #dc2626; }
        .bg-green { background: #064e3b; color: #a7f3d0; border: 1px solid #059669; }
        
        /* BOX PENCARIAN */
        .search-container { display: flex; gap: 10px; margin-bottom: 15px; }
        #search-input { 
            flex-grow: 1; padding: 12px; border-radius: 8px; border: 1px solid #334155; 
            background: #0f172a; color: white; font-size: 1em;
        }
        .btn-cari { background: #38bdf8; color: #0f172a; font-weight: bold; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .btn-cari:hover { background: #0ea5e9; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85em; }
        th, td { padding: 12px; border-bottom: 1px solid #334155; text-align: left; }
        th { background: #0f172a; color: #94a3b8; position: sticky; top: 0; }
        
        .row-duplicate { background-color: #450a0a !important; color: #fecaca !important; }
        .badge-duplicate { background: #ef4444; color: white; padding: 2px 5px; border-radius: 4px; font-size: 0.7em; margin-left: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Koneksi Saat Ini</h2>
        <div id="status-container">Menghubungkan ke Database...</div>
        <span id="ip-display" class="ip-text">Mencari IP...</span>
        <div id="isp-display" style="opacity: 0.8;">Mencari detail ISP...</div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3>Histori Shortlist</h3>
            <button onclick="location.reload();" style="background:#334155; color:white; border:none; padding:5px 15px; border-radius:5px; cursor:pointer;">Refresh Full</button>
        </div>
        
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Masukkan IP atau nama kota...">
            <button class="btn-cari" onclick="filterData()">Cari / Filter</button>
        </div>

        <div style="max-height: 450px; overflow-y: auto; border: 1px solid #334155;">
            <table>
                <thead>
                    <tr>
                        <th>Waktu</th>
                        <th>IP Address</th>
                        <th>ISP</th>
                        <th>Lokasi</th>
                    </tr>
                </thead>
                <tbody id="log-table">
                    <tr><td colspan="4" style="text-align:center;">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
        <div id="search-count" style="margin-top: 10px; font-size: 0.8em; color: #94a3b8;"></div>
    </div>
</div>

<script>
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby9ZLQZ33RUf3FU_wnAb1S0kgulHf18RQVNW2H2rjE31luMIzZE53JUZWGdxbgbNxGk/exec';
    let masterData = []; // Data asli dari Sheets
    let ipSaatIni = "";

    async function init() {
        try {
            // Ambil IP via Cloudflare
            const resIP = await fetch('https://1.1.1.1/cdn-cgi/trace');
            const txtIP = await resIP.text();
            ipSaatIni = txtIP.split('\n').find(l => l.startsWith('ip=')).split('=')[1];
            document.getElementById('ip-display').innerText = ipSaatIni;

            // Ambil Detail ISP
            let isp = "Unknown";
            let loc = "-";
            try {
                const resDet = await fetch(`https://ipapi.co/${ipSaatIni}/json/`);
                const det = await resDet.json();
                isp = det.org || "Unknown";
                loc = `${det.city}, ${det.country_name}`;
            } catch(e) {}
            document.getElementById('isp-display').innerText = "ISP: " + isp;

            // Kirim ke Sheets
            const time = new Date().toLocaleString('id-ID');
            await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ time, ip: ipSaatIni, isp, loc, proxy: "Check" })
            });

            // Tarik Histori (Delay 2 detik agar Sheets update dulu)
            setTimeout(async () => {
                const resHist = await fetch(GOOGLE_SCRIPT_URL);
                masterData = await resHist.json();
                renderTabel(masterData);
            }, 2000);

        } catch (err) {
            document.getElementById('status-container').innerText = "Error Sinkronisasi.";
        }
    }

    function renderTabel(data) {
        const ipCounts = {};
        masterData.forEach(item => {
            ipCounts[item.ip] = (ipCounts[item.ip] || 0) + 1;
        });

        // Update Header
        if (ipSaatIni && ipCounts[ipSaatIni] > 1) {
            document.getElementById('status-container').innerHTML = '<div class="status-box bg-red">⚠️ IP INI SUDAH PERNAH TERPAKAI!</div>';
        } else if (ipSaatIni) {
            document.getElementById('status-container').innerHTML = '<div class="status-box bg-green">✅ IP FRESH / BARU</div>';
        }

        const tableBody = document.getElementById('log-table');
        tableBody.innerHTML = data.map(item => {
            const isDup = ipCounts[item.ip] > 1;
            const rowClass = isDup ? 'class="row-duplicate"' : '';
            const badge = isDup ? '<span class="badge-duplicate">DUPLIKAT</span>' : '';
            return `<tr ${rowClass}>
                        <td>${item.time}</td>
                        <td style="font-family:monospace; font-weight:bold; color:#fbbf24;">${item.ip} ${badge}</td>
                        <td>${item.isp}</td>
                        <td>${item.loc}</td>
                    </tr>`;
        }).join('');
        document.getElementById('search-count').innerText = `Menampilkan ${data.length} baris.`;
    }

    // FUNGSI CARI / FILTER MANUAL
    function filterData() {
        const q = document.getElementById('search-input').value.toLowerCase();
        if (!q) {
            renderTabel(masterData);
            return;
        }

        const filtered = masterData.filter(item => {
            const statusDup = (masterData.filter(m => m.ip === item.ip).length > 1) ? "duplikat" : "";
            return item.ip.toLowerCase().includes(q) || 
                   item.isp.toLowerCase().includes(q) || 
                   item.loc.toLowerCase().includes(q) ||
                   statusDup.includes(q);
        });
        renderTabel(filtered);
    }

    init();
</script>
</body>
</html>
