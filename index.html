<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Monitor & Auto-Archive</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .card { background: #1e293b; padding: 25px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .ip-text { font-size: 32px; color: #fbbf24; font-weight: bold; font-family: monospace; display: block; margin: 5px 0; }
        .status-box { padding: 12px; border-radius: 8px; font-weight: bold; text-align: center; margin-bottom: 15px; }
        .bg-red { background: #7f1d1d; color: #fecaca; border: 1px solid #dc2626; }
        .bg-green { background: #064e3b; color: #a7f3d0; border: 1px solid #059669; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85em; }
        th, td { padding: 12px; border-bottom: 1px solid #334155; text-align: left; }
        th { background: #0f172a; color: #94a3b8; }
        .badge { background: #334155; padding: 2px 6px; border-radius: 4px; color: #38bdf8; }
        button { background: #334155; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; float: right; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Koneksi Saat Ini</h2>
        <div id="status-container">Menghubungkan ke server...</div>
        <span id="ip-display" class="ip-text">Mencari IP...</span>
        <div id="loc-display" style="font-size: 1.1em; color: #38bdf8;"></div>
        <div id="isp-display" style="opacity: 0.8; margin-top: 5px;"></div>
    </div>

    <div class="card" style="overflow-x: auto;">
        <button onclick="localStorage.removeItem('ip_final_v1'); location.reload();">Reset Tampilan</button>
        <h3>Histori (Tersimpan di Google Sheets)</h3>
        <table>
            <thead>
                <tr>
                    <th>Waktu</th>
                    <th>IPv4 Address</th>
                    <th>ISP</th>
                    <th>Lokasi</th>
                    <th>Proxy?</th>
                </tr>
            </thead>
            <tbody id="log-table"></tbody>
        </table>
    </div>
</div>

<script>
    // URL Web App Google Script Kamu
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbze2bEXcnXEscl-XtK6Im2tWD7nfPSG2FQjJJ-Z7RvaWauOUxeJh2tH8csX8igoyQj5/exec';

    async function fetchIPData() {
        const apiList = ['https://ipapi.co/json/', 'https://ipwho.is/'];
        let data = null;

        for (let api of apiList) {
            try {
                const res = await fetch(api);
                const json = await res.json();
                data = {
                    ip: json.ip || json.query,
                    isp: json.org || json.connection?.isp || json.isp || "Unknown",
                    country: json.country_name || json.country || "-",
                    city: json.city || "-",
                    isProxy: json.security?.proxy || json.proxy || false
                };
                if (data.ip) break;
            } catch (e) {}
        }

        if (data) processResult(data);
        else document.getElementById('status-container').innerText = "Gagal mengambil data.";
    }

    function processResult(data) {
        const time = new Date().toLocaleString('id-ID');
        const loc = `${data.city}, ${data.country}`;
        const proxyStatus = data.isProxy ? "YES" : "NO";

        // Cek histori lokal (untuk tampilan cepat)
        let history = JSON.parse(localStorage.getItem('ip_final_v1')) || [];
        const isUsed = history.some(item => item.ip === data.ip);

        // Update UI
        document.getElementById('ip-display').innerText = data.ip;
        document.getElementById('loc-display').innerText = `📍 ${loc}`;
        document.getElementById('isp-display').innerText = `🏢 ISP: ${data.isp}`;

        if (isUsed) {
            document.getElementById('status-container').innerHTML = '<div class="status-box bg-red">⚠️ IP INI SUDAH PERNAH TERPAKAI!</div>';
        } else {
            document.getElementById('status-container').innerHTML = '<div class="status-box bg-green">✅ IP FRESH / TERCATAT KE DATABASE</div>';
            
            // KIRIM KE GOOGLE SHEETS
            sendToGoogleSheets(time, data.ip, data.isp, loc, proxyStatus);

            // Simpan lokal
            history.unshift({ time, ip: data.ip, isp: data.isp, loc, proxy: proxyStatus });
            localStorage.setItem('ip_final_v1', JSON.stringify(history));
        }

        renderTable(history);
    }

    function sendToGoogleSheets(time, ip, isp, loc, proxy) {
        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ time, ip, isp, loc, proxy })
        });
    }

    function renderTable(history) {
        document.getElementById('log-table').innerHTML = history.map(item => `
            <tr>
                <td>${item.time}</td>
                <td style="font-family: monospace; font-weight: bold; color: #fbbf24;">${item.ip}</td>
                <td>${item.isp}</td>
                <td><span class="badge">${item.loc}</span></td>
                <td>${item.proxy}</td>
            </tr>
        `).join('');
    }

    fetchIPData();
</script>
</body>
</html>
