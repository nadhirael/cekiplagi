<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Monitor Pro - Dual Shortcut</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: auto; padding-bottom: 50px; }
        
        /* NAVIGASI: TAMBAH/EDIT LINK DI SINI */
        .nav-menu { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 10px; overflow-x: auto; align-items: center; }
        .nav-link { padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; background: #1e293b; color: #94a3b8; text-decoration: none; white-space: nowrap; font-size: 13px; }
        .nav-link.active { background: #38bdf8; color: #0f172a; }
        .nav-link:hover:not(.active) { background: #334155; color: white; }
        /* Warna Tombol Shortcut */
        .btn-blue { background: #4f46e5 !important; color: white !important; }
        .btn-purple { background: #7c3aed !important; color: white !important; }

        .card { background: #1e293b; padding: 25px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 20px; }
        .ip-text { font-size: 32px; color: #fbbf24; font-weight: bold; font-family: monospace; }
        .status-box { padding: 12px; border-radius: 8px; font-weight: bold; text-align: center; margin-bottom: 15px; }
        .bg-red { background: #7f1d1d; color: #fecaca; border: 1px solid #dc2626; }
        .bg-green { background: #064e3b; color: #a7f3d0; border: 1px solid #059669; }
        
        .controls-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; align-items: center; }
        input, select { padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 14px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        th, td { padding: 12px; border-bottom: 1px solid #334155; text-align: left; }
        th { background: #0f172a; color: #94a3b8; }
        .row-duplicate { background-color: #450a0a !important; color: #fecaca !important; }
        
        .copy-btn { background: #38bdf8; color: #0f172a; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-action { background: #38bdf8; color: #0f172a; border: none; padding: 15px 25px; border-radius: 30px; cursor: pointer; font-weight: bold; }

        .page-content { display: none; }
        .page-content.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-menu">
        <div class="nav-link active" onclick="openPage('ip-monitor', this)">Monitor</div>
        <div class="nav-link" onclick="openPage('speed-test', this)">Speedtest</div>
        <div class="nav-link" onclick="openPage('zip-search', this)">Kode Pos</div>
        
        <span style="color: #334155; margin: 0 5px;">|</span>
        
        <a href="https://stake.com/ru" target="_blank" class="nav-link btn-blue">Stake RU ↗</a>
        <a href="https://stake1022.com/ru" target="_blank" class="nav-link btn-purple">Stake 1022 ↗</a>
    </div>

    <div id="ip-monitor" class="page-content active">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>Koneksi Saat Ini</h2>
                <button onclick="location.reload()" class="copy-btn" style="background:#334155; color:white;">🔄 REFRESH</button>
            </div>
            <div id="status-container">Sinkronisasi...</div>
            <div style="display: flex; align-items: center; flex-wrap: wrap; gap: 10px; margin-top: 10px;">
                <span id="ip-display" class="ip-text">Mencari IP...</span>
                <button class="copy-btn" onclick="copyText(document.getElementById('ip-display').innerText)">COPY IP</button>
            </div>
            <div id="loc-display" style="color: #38bdf8; margin-top: 10px; font-weight: bold;">📍 Mencari Lokasi...</div>
            <div id="isp-display" style="opacity: 0.8; margin-top: 4px;">🏢 Mencari ISP...</div>
        </div>

        <div class="card">
            <h3 style="margin: 0 0 15px 0;">Histori Database</h3>
            <div class="controls-container">
                <input type="text" id="search-input" placeholder="Cari IP..." oninput="renderTabel()" style="flex-grow: 1;">
                <select id="rows-per-page" onchange="renderTabel()">
                    <option value="10">10 Baris</option>
                    <option value="20">20 Baris</option>
                </select>
            </div>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Waktu</th>
                            <th>IP Address</th>
                            <th>ISP</th>
                            <th>Lokasi</th>
                        </tr>
                    </thead>
                    <tbody id="log-table"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="speed-test" class="page-content">
        <div class="card" style="text-align: center;">
            <iframe src="https://fast.com" width="100%" height="450px" frameborder="0" style="background:white; border-radius:12px;"></iframe>
        </div>
    </div>

    <div id="zip-search" class="page-content">
        <div class="card" style="text-align: center; padding: 50px 20px;">
            <div style="max-width: 500px; margin: auto;">
                <input type="text" id="single-query" placeholder="Ketik Wilayah..." style="width: 100%; border-radius: 30px; padding: 15px; margin-bottom: 20px; text-align: center; border: 1px solid #334155;">
                <button class="btn-action" onclick="searchZip()">CARI DI GOOGLE</button>
            </div>
        </div>
    </div>
</div>

<script>
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby9ZLQZ33RUf3FU_wnAb1S0kgulHf18RQVNW2H2rjE31luMIzZE53JUZWGdxbgbNxGk/exec';
    let masterData = [];
    let ipSaatIni = "";

    function openPage(pageId, element) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        element.classList.add('active');
    }

    function searchZip() {
        const val = document.getElementById('single-query').value.trim();
        if (!val) return;
        window.open(`https://www.google.com/search?q=${encodeURIComponent("kode pos " + val)}`, '_blank');
    }

    function playAlert(dup) {
        const msg = new SpeechSynthesisUtterance(dup ? 'Duplicate' : 'Fresh');
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }

    function copyText(txt) { 
        navigator.clipboard.writeText(txt).then(() => alert("Salin: " + txt)); 
    }

    async function init() {
        try {
            const resIP = await fetch('https://1.1.1.1/cdn-cgi/trace');
            const txtIP = await resIP.text();
            ipSaatIni = txtIP.split('\n').find(l => l.startsWith('ip=')).split('=')[1];
            document.getElementById('ip-display').innerText = ipSaatIni;

            const det = await (await fetch(`https://ipapi.co/${ipSaatIni}/json/`)).json();
            const lokasi = `${det.city}, ${det.country_name}`;
            
            document.getElementById('loc-display').innerHTML = `📍 ${lokasi}`;
            document.getElementById('isp-display').innerText = "🏢 " + (det.org || 'Unknown');

            await fetch(GOOGLE_SCRIPT_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({ time: new Date().toLocaleString('id-ID'), ip: ipSaatIni, isp: det.org, loc: lokasi })
            });

            setTimeout(async () => {
                const response = await fetch(GOOGLE_SCRIPT_URL);
                masterData = await response.json();
                renderTabel(true);
            }, 1500);
        } catch (e) {}
    }

    function renderTabel(sound = false) {
        const query = document.getElementById('search-input').value.toLowerCase();
        const rows = parseInt(document.getElementById('rows-per-page').value);
        const counts = {};
        masterData.forEach(item => { counts[item.ip] = (counts[item.ip] || 0) + 1; });

        const filtered = masterData.filter(item => String(item.ip).includes(query)).slice(0, rows);
        const isDup = (counts[ipSaatIni] || 0) > 1;

        document.getElementById('status-container').innerHTML = isDup 
            ? `<div class="status-box bg-red">⚠️ TERPAKAI (${counts[ipSaatIni]}x)</div>` 
            : '<div class="status-box bg-green">✅ FRESH</div>';

        if (sound) playAlert(isDup);

        document.getElementById('log-table').innerHTML = filtered.map(item => {
            const c = counts[item.ip] || 0;
            return `<tr class="${c > 1 ? 'row-duplicate' : ''}">
                <td>${item.time}</td>
                <td style="font-family:monospace; font-weight:bold; color:#fbbf24;">${item.ip} ${c > 1 ? `(${c}x)` : ''}</td>
                <td>${item.isp}</td>
                <td>${item.loc}</td>
            </tr>`;
        }).join('');
    }

    init();
</script>
</body>
</html>
