<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP & UA Monitor Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; margin: 0; }
        .container { max-width: 1100px; margin: auto; padding-bottom: 50px; }
        
        .nav-menu { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 10px; overflow-x: auto; align-items: center; }
        .nav-link { padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; background: #1e293b; color: #94a3b8; text-decoration: none; white-space: nowrap; font-size: 13px; }
        .nav-link.active { background: #38bdf8; color: #0f172a; }
        .btn-blue { background: #4f46e5 !important; color: white !important; }
        .btn-purple { background: #7c3aed !important; color: white !important; }

        .card { background: #1e293b; padding: 25px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 20px; }
        .ip-text { font-size: 32px; color: #fbbf24; font-weight: bold; font-family: monospace; }
        
        .clock-container { display: flex; gap: 15px; margin-top: 15px; padding-top: 15px; border-top: 1px solid #334155; }
        .clock-box { flex: 1; background: #0f172a; padding: 12px; border-radius: 10px; text-align: center; border: 1px solid #1e293b; }
        .clock-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .clock-time { font-size: 22px; font-weight: bold; color: #38bdf8; font-family: monospace; }
        .clock-date { font-size: 11px; color: #fbbf24; margin-top: 4px; display: block; }

        .ping-box { margin: 15px 0; padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 13px; background: #0f172a; border: 1px solid #334155; }
        
        /* STATUS BOX */
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .status-box { padding: 12px; border-radius: 8px; font-weight: bold; text-align: center; font-size: 13px; border-left: 8px solid transparent; }
        .bg-red { background: #7f1d1d; color: #fecaca; border-color: #ef4444; }
        .bg-green { background: #064e3b; color: #a7f3d0; border-color: #10b981; }
        .bg-wait { background: #334155; color: #94a3b8; grid-column: span 2; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.8em; }
        th, td { padding: 10px; border-bottom: 1px solid #334155; text-align: left; vertical-align: top; }
        .ua-text { font-size: 10px; opacity: 0.7; display: block; max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
        .ua-text:hover { white-space: normal; overflow: visible; background: #0f172a; position: absolute; max-width: 400px; z-index: 10; padding: 5px; border-radius: 4px; border: 1px solid #38bdf8; }

        .row-duplicate { background-color: #450a0a !important; }
        .copy-btn { background: #38bdf8; color: #0f172a; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-page { background: #334155; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .page-content { display: none; }
        .page-content.active { display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-menu">
        <div class="nav-link active" onclick="openPage('ip-monitor', this)">Monitor</div>
        <div class="nav-link" onclick="openPage('speed-test', this)">Speedtest</div>
        <div class="nav-link" onclick="openPage('zip-search', this)">Kode Pos</div>
        <span style="color: #334155; margin: 0 5px;">|</span>
        <a href="https://stake.com/ru" target="_blank" class="nav-link btn-blue">Stake RU ↗</a>
        <a href="https://stake1022.com/ru" target="_blank" class="nav-link btn-purple">Stake 1022 ↗</a>
    </div>

    <div id="ip-monitor" class="page-content active">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>Koneksi Saat Ini</h2>
                <button onclick="location.reload()" class="copy-btn" style="background:#334155; color:white;">🔄 REFRESH</button>
            </div>
            
            <div id="status-container" class="status-grid">
                <div class="status-box bg-wait">⏳ MENGANALISA DATABASE...</div>
            </div>

            <div style="display: flex; align-items: center; flex-wrap: wrap; gap: 10px; margin-top: 10px;">
                <span id="ip-display" class="ip-text">...</span>
                <button class="copy-btn" onclick="copyText(document.getElementById('ip-display').innerText)">COPY IP</button>
            </div>
            <div id="loc-display" style="color: #38bdf8; margin-top: 10px; font-weight: bold;">📍 Mendeteksi Lokasi...</div>
            <div id="isp-display" style="opacity: 0.8; margin-top: 4px; font-size: 14px;">🏢 ISP: --</div>
            <div id="ua-display" style="opacity: 0.6; margin-top: 4px; font-size: 11px; font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">UA: --</div>

            <div class="ping-box" id="ping-display">LATENCY: <span>Checking...</span></div>

            <div class="clock-container">
                <div class="clock-box"><span class="clock-label">WIB</span><div id="clock-indo" class="clock-time">00:00:00</div><div id="date-indo" class="clock-date">--/--/----</div></div>
                <div class="clock-box"><span class="clock-label" id="label-ip-time">LOKAL</span><div id="clock-ip" class="clock-time">00:00:00</div><div id="date-ip" class="clock-date">--/--/----</div></div>
            </div>
        </div>

        <div class="card">
            <h3 style="margin: 0 0 15px 0;">Histori Database</h3>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <input type="text" id="search-input" placeholder="Cari IP..." oninput="resetToFirstPage()" style="flex-grow: 1;">
                <select id="rows-per-page" onchange="resetToFirstPage()">
                    <option value="10">10 Baris</option>
                    <option value="20">20 Baris</option>
                </select>
            </div>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Waktu</th>
                            <th>IP Address</th>
                            <th>ISP</th>
                            <th>Lokasi</th>
                            <th>User Agent</th>
                        </tr>
                    </thead>
                    <tbody id="log-table"><tr><td colspan="5" style="text-align:center; padding:20px;">Memuat data...</td></tr></tbody>
                </table>
            </div>
            <div style="display:flex; justify-content:center; align-items:center; gap:15px; margin-top:20px;">
                <button id="prev-btn" class="btn-page" onclick="changePage(-1)">Prev</button>
                <span id="page-label" style="font-size:0.9em; color:#94a3b8;">Page 1</span>
                <button id="next-btn" class="btn-page" onclick="changePage(1)">Next</button>
            </div>
        </div>
    </div>

    <div id="speed-test" class="page-content">
        <div class="card" style="text-align: center;"><iframe src="https://fast.com" width="100%" height="450px" frameborder="0" style="background:white; border-radius:12px;"></iframe></div>
    </div>
    <div id="zip-search" class="page-content">
        <div class="card" style="text-align: center; padding: 50px 20px;">
            <div style="max-width: 500px; margin: auto;">
                <input type="text" id="single-query" placeholder="Ketik Wilayah..." style="width: 100%; border-radius: 30px; padding: 15px; margin-bottom: 20px; text-align: center; border: 1px solid #334155;">
                <button onclick="searchZip()" style="background:#38bdf8; color:#0f172a; padding:15px 30px; border-radius:30px; border:none; font-weight:bold; cursor:pointer;">CARI KODE POS</button>
            </div>
        </div>
    </div>
</div>

<script>
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxYRAZarHOHbp-S9hR_yj5lxXkRKk3ZiP5rO_Wm5uKlLur6rvljGkNd59AkQUfc6ZbA/exec';
    
    let masterData = [];
    let ipSaatIni = "";
    let userTimeZone = "Asia/Jakarta";
    let currentPage = 1;
    let rowsPerPage = 10;
    const currentUA = navigator.userAgent;

    async function checkPing() {
        const start = Date.now();
        try {
            await fetch('https://1.1.1.1/favicon.ico', { mode: 'no-cors', cache: 'no-cache' });
            const ping = Date.now() - start;
            const display = document.getElementById('ping-display');
            let color = ping < 150 ? '#10b981' : (ping < 400 ? '#f59e0b' : '#ef4444');
            display.innerHTML = `LATENCY: <span style="color:${color}">${ping} ms</span>`;
        } catch (e) { document.getElementById('ping-display').innerHTML = `LATENCY: <span style="color:#ef4444">ERROR</span>`; }
    }
    setInterval(checkPing, 5000);

    function updateClocks() {
        const now = new Date();
        const timeFmt = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
        const dateFmt = { day: '2-digit', month: '2-digit', year: 'numeric' };
        document.getElementById('clock-indo').innerText = new Intl.DateTimeFormat('id-ID', { ...timeFmt, timeZone: 'Asia/Jakarta' }).format(now);
        document.getElementById('date-indo').innerText = new Intl.DateTimeFormat('id-ID', { ...dateFmt, timeZone: 'Asia/Jakarta' }).format(now).replace(/\//g, '-');
        try {
            document.getElementById('clock-ip').innerText = new Intl.DateTimeFormat('id-ID', { ...timeFmt, timeZone: userTimeZone }).format(now);
            document.getElementById('date-ip').innerText = new Intl.DateTimeFormat('id-ID', { ...dateFmt, timeZone: userTimeZone }).format(now).replace(/\//g, '-');
        } catch(e) { userTimeZone = "UTC"; }
    }
    setInterval(updateClocks, 1000);

    function openPage(pageId, element) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        element.classList.add('active');
    }

    function searchZip() {
        const val = document.getElementById('single-query').value.trim();
        if (val) window.open(`https://www.google.com/search?q=${encodeURIComponent("kode pos " + val)}`, '_blank');
    }

    function copyText(txt) { navigator.clipboard.writeText(txt).then(() => alert("Salin: " + txt)); }

    async function init() {
        checkPing();
        document.getElementById('ua-display').innerText = "UA: " + currentUA;
        try {
            const resIP = await fetch('https://api.ipify.org?format=json');
            const dataIP = await resIP.json();
            ipSaatIni = dataIP.ip;
            document.getElementById('ip-display').innerText = ipSaatIni;

            const det = await (await fetch(`https://ipapi.co/${ipSaatIni}/json/`)).json();
            userTimeZone = det.timezone || "Asia/Jakarta";
            const lokasi = `${det.city}, ${det.country_name}`;
            document.getElementById('loc-display').innerHTML = `📍 ${lokasi}`;
            document.getElementById('isp-display').innerText = "🏢 ISP: " + (det.org || '--');
            document.getElementById('label-ip-time').innerText = `WAKTU (${det.city})`;

            // SIMPAN DATA KE SHEETS
            await fetch(GOOGLE_SCRIPT_URL, { 
                method: 'POST', mode: 'no-cors', 
                body: JSON.stringify({ 
                    time: new Date().toLocaleString('id-ID'), 
                    ip: ipSaatIni, 
                    isp: det.org, 
                    loc: lokasi,
                    ua: currentUA 
                })
            });

            // TARIK HISTORI
            const response = await fetch(GOOGLE_SCRIPT_URL);
            masterData = await response.json();
            renderTabel();
        } catch (e) { document.getElementById('status-container').innerHTML = `<div class="status-box bg-red" style="grid-column: span 2;">ERROR DATABASE</div>`; }
    }

    function renderTabel() {
        if (masterData.length === 0) return;
        const query = document.getElementById('search-input').value.toLowerCase();
        rowsPerPage = parseInt(document.getElementById('rows-per-page').value);
        
        const ipCounts = {};
        const uaCounts = {};
        
        masterData.forEach(item => { 
            ipCounts[item.ip] = (ipCounts[item.ip] || 0) + 1; 
            uaCounts[item.ua] = (uaCounts[item.ua] || 0) + 1;
        });

        const filtered = masterData.filter(item => String(item.ip).includes(query));
        const totalPages = Math.ceil(filtered.length / rowsPerPage) || 1;
        const pageData = filtered.slice((currentPage - 1) * rowsPerPage, currentPage * rowsPerPage);

        // TAMPILKAN STATUS DOUBLE (IP & UA)
        const currentIPCount = ipCounts[ipSaatIni] || 0;
        const currentUACount = uaCounts[currentUA] || 0;

        let ipStatusHTML = currentIPCount > 1 
            ? `<div class="status-box bg-red">IP TERPAKAI (${currentIPCount}x)</div>` 
            : `<div class="status-box bg-green">IP FRESH (1x)</div>`;
            
        let uaStatusHTML = currentUACount > 1 
            ? `<div class="status-box bg-red">UA TERPAKAI (${currentUACount}x)</div>` 
            : `<div class="status-box bg-green">UA FRESH (1x)</div>`;

        document.getElementById('status-container').innerHTML = ipStatusHTML + uaStatusHTML;

        document.getElementById('log-table').innerHTML = pageData.map(item => {
            const iC = ipCounts[item.ip] || 0;
            const uC = uaCounts[item.ua] || 0;
            return `<tr class="${iC > 1 ? 'row-duplicate' : ''}">
                <td>${item.time}</td>
                <td style="font-family:monospace; font-weight:bold; color:#fbbf24;">${item.ip} ${iC > 1 ? `(${iC}x)` : ''}</td>
                <td>${item.isp}</td>
                <td>${item.loc}</td>
                <td>
                    <span class="ua-text" title="${item.ua || '-'}">${item.ua || '-'}</span>
                    <small style="color:${uC > 1 ? '#ef4444' : '#10b981'}; font-weight:bold;">[Used: ${uC}x]</small>
                </td>
            </tr>`;
        }).join('');

        document.getElementById('page-label').innerText = `Page ${currentPage} of ${totalPages}`;
        document.getElementById('prev-btn').disabled = currentPage === 1;
        document.getElementById('next-btn').disabled = currentPage === totalPages;
    }

    function changePage(step) { currentPage += step; renderTabel(); }
    function resetToFirstPage() { currentPage = 1; renderTabel(); }

    init();
</script>
</body>
</html>
