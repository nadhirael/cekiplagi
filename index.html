<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Monitor - Ultra Bypass</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .card { background: #1e293b; padding: 25px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 20px; }
        .ip-text { font-size: 32px; color: #fbbf24; font-weight: bold; font-family: monospace; display: block; margin: 10px 0; }
        .status-box { padding: 12px; border-radius: 8px; font-weight: bold; text-align: center; margin-bottom: 15px; }
        .bg-red { background: #7f1d1d; color: #fecaca; border: 1px solid #dc2626; }
        .bg-green { background: #064e3b; color: #a7f3d0; border: 1px solid #059669; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85em; }
        th, td { padding: 12px; border-bottom: 1px solid #334155; text-align: left; }
        th { background: #0f172a; color: #94a3b8; }
        button { background: #334155; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; float: right; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Detail Koneksi</h2>
        <div id="status-container">Menghubungkan ke Database...</div>
        <span id="ip-display" class="ip-text">Mencari IP...</span>
        <div id="isp-display" style="opacity: 0.8;">Mencari ISP...</div>
    </div>

    <div class="card" style="overflow-x: auto;">
        <button onclick="location.reload();">Refresh Data</button>
        <h3>Histori Database (Sinkron)</h3>
        <table>
            <thead>
                <tr>
                    <th>Waktu Akses</th>
                    <th>IPv4 Address</th>
                    <th>ISP</th>
                    <th>Lokasi</th>
                </tr>
            </thead>
            <tbody id="log-table">
                <tr><td colspan="4" style="text-align:center;">Memuat histori...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // URL Web App Google Script kamu
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby9ZLQZ33RUf3FU_wnAb1S0kgulHf18RQVNW2H2rjE31luMIzZE53JUZWGdxbgbNxGk/exec';

    async function init() {
        try {
            // STEP 1: Ambil IP via Cloudflare (Bypass 403)
            const cfRes = await fetch('https://1.1.1.1/cdn-cgi/trace');
            const cfText = await cfRes.text();
            const currentIP = cfText.split('\n').find(line => line.startsWith('ip=')).split('=')[1];
            
            document.getElementById('ip-display').innerText = currentIP;

            // STEP 2: Ambil Detail via API Cadangan (ipapi.co) jika ipwhois blokir
            let isp = "Unknown ISP";
            let loc = "-";
            try {
                const detRes = await fetch(`https://ipapi.co/${currentIP}/json/`);
                const detData = await detRes.json();
                isp = detData.org || "Unknown";
                loc = `${detData.city}, ${detData.country_name}`;
            } catch(e) { console.log("Detail API blocked, using defaults"); }

            document.getElementById('isp-display').innerText = "ISP: " + isp;

            // STEP 3: Kirim ke Google Sheets
            const time = new Date().toLocaleString('id-ID');
            await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ time, ip: currentIP, isp, loc, proxy: "Check Sheets" })
            });

            // STEP 4: Ambil Histori
            const historyRes = await fetch(GOOGLE_SCRIPT_URL);
            const history = await historyRes.json();

            // Cek Duplikat
            const isUsed = history.some(item => item.ip === currentIP && item.time !== time);
            if (isUsed) {
                document.getElementById('status-container').innerHTML = '<div class="status-box bg-red">⚠️ IP INI SUDAH PERNAH TERPAKAI!</div>';
            } else {
                document.getElementById('status-container').innerHTML = '<div class="status-box bg-green">✅ IP BARU TERCATAT</div>';
            }

            // Update Tabel
            document.getElementById('log-table').innerHTML = history.map(item => `
                <tr>
                    <td>${item.time}</td>
                    <td style="font-family: monospace; font-weight: bold; color: #fbbf24;">${item.ip}</td>
                    <td>${item.isp}</td>
                    <td>${item.loc}</td>
                </tr>
            `).join('');

        } catch (error) {
            document.getElementById('status-container').innerText = "Koneksi Database Gagal. Pastikan Google Sheets sudah di-Share 'Anyone with link'.";
        }
    }

    init();
</script>
</body>
</html>
