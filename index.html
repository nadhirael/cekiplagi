<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Monitor & Speedtest</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: auto; padding-bottom: 50px; }
        
        /* NAVIGASI MENU */
        .nav-menu { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .nav-link { padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; background: #1e293b; color: #94a3b8; }
        .nav-link.active { background: #38bdf8; color: #0f172a; }
        .nav-link:hover:not(.active) { background: #334155; color: white; }

        .card { background: #1e293b; padding: 25px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.2); }
        .ip-text { font-size: 32px; color: #fbbf24; font-weight: bold; font-family: monospace; }
        .status-box { padding: 12px; border-radius: 8px; font-weight: bold; text-align: center; margin-bottom: 15px; }
        .bg-red { background: #7f1d1d; color: #fecaca; border: 1px solid #dc2626; }
        .bg-green { background: #064e3b; color: #a7f3d0; border: 1px solid #059669; }
        
        .controls-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; align-items: center; }
        #search-input { flex-grow: 1; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }
        .rows-select { padding: 11px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }

        table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        th, td { padding: 12px; border-bottom: 1px solid #334155; text-align: left; }
        th { background: #0f172a; color: #94a3b8; }
        .row-duplicate { background-color: #450a0a !important; color: #fecaca !important; }
        .badge-duplicate { background: #ef4444; color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.75em; margin-left: 8px; font-weight: bold; }
        
        .pagination { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 20px; }
        .btn-page { background: #334155; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
        
        .copy-btn { background: #38bdf8; color: #0f172a; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-left: 10px; }
        
        /* PAGE CONTENT */
        .page-content { display: none; }
        .page-content.active { display: block; animation: fadeIn 0.5s; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-menu">
        <div class="nav-link active" onclick="openPage('ip-monitor', this)">IP Monitor</div>
        <div class="nav-link" onclick="openPage('speed-test', this)">Speedtest</div>
    </div>

    <div id="ip-monitor" class="page-content active">
        <div class="card">
            <h2>Koneksi Saat Ini</h2>
            <div id="status-container">Sinkronisasi Database...</div>
            <div style="display: flex; align-items: center;">
                <span id="ip-display" class="ip-text">Mencari IP...</span>
                <button class="copy-btn" onclick="copyCurrentIP()">COPY</button>
            </div>
            <div id="loc-display" style="color: #38bdf8; margin-top: 10px;"></div>
            <div id="isp-display" style="opacity: 0.8;"></div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center;">
                <h3>Histori Database</h3>
                <button onclick="location.reload()" style="background:#334155; border:none; color:white; padding:5px 12px; cursor:pointer; border-radius:5px;">Refresh</button>
            </div>
            
            <div class="controls-container">
                <input type="text" id="search-input" placeholder="Cari IP, Kota, atau 'duplikat'..." oninput="resetToFirstPage()">
                <select id="rows-per-page" class="rows-select" onchange="updateRowsPerPage()">
                    <option value="10">10 Baris</option>
                    <option value="20">20 Baris</option>
                    <option value="50">50 Baris</option>
                </select>
            </div>

            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Waktu</th>
                            <th>IP Address</th>
                            <th>ISP</th>
                            <th>Lokasi</th>
                        </tr>
                    </thead>
                    <tbody id="log-table"></tbody>
                </table>
            </div>

            <div class="pagination">
                <button id="prev-btn" class="btn-page" onclick="changePage(-1)">Prev</button>
                <span id="page-label" class="page-info">Page 1</span>
                <button id="next-btn" class="btn-page" onclick="changePage(1)">Next</button>
            </div>
        </div>
    </div>

    <div id="speed-test" class="page-content">
        <div class="card" style="padding: 0; overflow: hidden; height: 600px;">
            <iframe width="100%" height="600px" frameborder="0" src="https://www.speedtest.net/id"></iframe>
        </div>
        <p style="text-align: center; color: #94a3b8; font-size: 0.8em; margin-top: 10px;">
            Powered by Ookla Speedtest
        </p>
    </div>
</div>

<script>
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby9ZLQZ33RUf3FU_wnAb1S0kgulHf18RQVNW2H2rjE31luMIzZE53JUZWGdxbgbNxGk/exec';
    let masterData = [];
    let currentPage = 1;
    let rowsPerPage = 10;
    let ipSaatIni = "";

    // FUNGSI GANTI HALAMAN/MENU
    function openPage(pageId, element) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        element.classList.add('active');
    }

    async function init() {
        try {
            const resIP = await fetch('https://1.1.1.1/cdn-cgi/trace');
            const txtIP = await resIP.text();
            ipSaatIni = txtIP.split('\n').find(l => l.startsWith('ip=')).split('=')[1];
            document.getElementById('ip-display').innerText = ipSaatIni;

            let isp = "Unknown", loc = "-";
            try {
                const det = await (await fetch(`https://ipapi.co/${ipSaatIni}/json/`)).json();
                isp = det.org; loc = `${det.city}, ${det.country_name}`;
            } catch(e) {}
            document.getElementById('loc-display').innerText = "📍 " + loc;
            document.getElementById('isp-display').innerText = "🏢 " + isp;

            await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ time: new Date().toLocaleString('id-ID'), ip: ipSaatIni, isp, loc, proxy: "Check" })});

            setTimeout(async () => {
                const res = await fetch(GOOGLE_SCRIPT_URL);
                masterData = await res.json();
                renderTabel();
            }, 1500);
        } catch (e) { document.getElementById('status-container').innerText = "Koneksi Gagal."; }
    }

    function renderTabel() {
        const query = document.getElementById('search-input').value.toLowerCase();
        let filteredData = masterData.filter(item => {
            const isDup = masterData.filter(m => String(m.ip) === String(item.ip)).length > 1;
            return String(item.ip).toLowerCase().includes(query) || 
                   String(item.isp).toLowerCase().includes(query) || 
                   String(item.loc).toLowerCase().includes(query) ||
                   (isDup && "duplikat".includes(query));
        });

        const totalPages = Math.ceil(filteredData.length / rowsPerPage) || 1;
        const start = (currentPage - 1) * rowsPerPage;
        const pageData = filteredData.slice(start, start + rowsPerPage);

        const currentCount = masterData.filter(x => String(x.ip) === ipSaatIni).length;
        document.getElementById('status-container').innerHTML = currentCount > 1 
            ? '<div class="status-box bg-red">⚠️ IP INI SUDAH PERNAH TERPAKAI!</div>' 
            : '<div class="status-box bg-green">✅ IP FRESH / BARU</div>';

        const tableBody = document.getElementById('log-table');
        tableBody.innerHTML = pageData.map(item => {
            const isDup = masterData.filter(x => String(x.ip) === String(item.ip)).length > 1;
            return `<tr class="${isDup ? 'row-duplicate' : ''}">
                <td>${item.time}</td>
                <td style="font-family:monospace; font-weight:bold; color:#fbbf24;">${item.ip} ${isDup ? '<span class="badge-duplicate">DUPLIKAT</span>' : ''}</td>
                <td>${item.isp}</td>
                <td>${item.loc}</td>
            </tr>`;
        }).join('');

        document.getElementById('page-label').innerText = `Page ${currentPage} of ${totalPages}`;
        document.getElementById('prev-btn').disabled = currentPage === 1;
        document.getElementById('next-btn').disabled = currentPage === totalPages;
    }

    function updateRowsPerPage() { rowsPerPage = parseInt(document.getElementById('rows-per-page').value); currentPage = 1; renderTabel(); }
    function changePage(step) { currentPage += step; renderTabel(); }
    function resetToFirstPage() { currentPage = 1; renderTabel(); }
    function copyCurrentIP() { navigator.clipboard.writeText(ipSaatIni); alert("IP Berhasil disalin!"); }

    init();
</script>
</body>
</html>
