<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Network & Pos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen p-4">

    <div class="max-w-4xl mx-auto space-y-6">
        <h1 class="text-2xl font-bold text-center text-blue-400">Admin Monitoring Tool</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="bg-slate-800 p-5 rounded-lg border border-slate-700">
                <h2 class="text-lg font-bold mb-3 flex items-center">
                    <span class="mr-2">🖥️</span> IP Monitor & Counter
                </h2>
                <div class="space-y-4">
                    <div class="bg-slate-900 p-3 rounded border border-slate-600">
                        <p class="text-xs text-slate-400 uppercase">IP Address Saat Ini</p>
                        <p id="ip-display" class="text-xl font-mono text-green-400 font-bold">Mengecek...</p>
                    </div>
                    <div class="bg-red-900/30 p-3 rounded border border-red-500/50 flex justify-between items-center">
                        <div>
                            <p class="text-xs text-red-300 uppercase">Duplikat Terdeteksi</p>
                            <p id="dup-count" class="text-3xl font-black text-red-500">0</p>
                        </div>
                        <div class="text-right">
                            <span id="status-sound" class="text-[10px] bg-red-600 px-2 py-1 rounded">SUARA AKTIF</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-slate-800 p-5 rounded-lg border border-slate-700">
                <h2 class="text-lg font-bold mb-3 flex items-center">
                    <span class="mr-2">🚀</span> Speedtest
                </h2>
                <p class="text-sm text-slate-400 mb-4">Cek kecepatan bandwidth via Fast.com (Netflix).</p>
                <a href="https://fast.com" target="_blank" class="block w-full bg-blue-600 hover:bg-blue-500 text-white text-center py-4 rounded-md font-bold transition-all">
                    MULAI TEST SPEED
                </a>
            </div>

            <div class="bg-slate-800 p-5 rounded-lg border border-slate-700 md:col-span-2">
                <h2 class="text-lg font-bold mb-3 flex items-center">
                    <span class="mr-2">📮</span> Cari Kode Pos Indonesia
                </h2>
                <div class="flex gap-2">
                    <input type="text" id="search-pos" placeholder="Ketik nama kelurahan atau kecamatan..." class="flex-1 bg-slate-900 border border-slate-600 p-2 rounded focus:outline-none focus:border-blue-500">
                </div>
                <div id="pos-results" class="mt-4 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-2 max-h-40 overflow-y-auto">
                    <p class="text-slate-500 text-sm italic">Hasil pencarian akan tampil di sini...</p>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- SETTING IP & SUARA ---
        let lastIP = "";
        let duplicateCounter = 0;
        
        // Suara Beep (menggunakan standar web audio)
        const sound = new Howl({
            src: ['https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3'], 
            volume: 0.5
        });

        async function monitorIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                const currentIP = data.ip;

                document.getElementById('ip-display').innerText = currentIP;

                if (currentIP === lastIP) {
                    duplicateCounter++;
                    document.getElementById('dup-count').innerText = duplicateCounter;
                    sound.play(); // Bunyi jika IP sama dengan sebelumnya
                } else {
                    lastIP = currentIP;
                }
            } catch (err) {
                document.getElementById('ip-display').innerText = "Koneksi Error";
            }
        }

        // Jalankan setiap 5 detik
        setInterval(monitorIP, 5000);
        monitorIP();

        // --- SEARCH KODE POS (SIMULASI API) ---
        const posInput = document.getElementById('search-pos');
        const posResults = document.getElementById('pos-results');

        posInput.addEventListener('input', function() {
            const val = this.value.toLowerCase();
            if(val.length < 3) return;

            // Simulasi hasil - Idealnya fetch ke API Kode Pos
            // Ini contoh tampilan jika data ditemukan
            posResults.innerHTML = `
                <div class="bg-slate-700 p-2 rounded text-sm border-l-4 border-blue-500">
                    <p class="font-bold">${val.toUpperCase()}</p>
                    <p class="text-blue-300">Kode: 40123</p>
                </div>
                <div class="bg-slate-700 p-2 rounded text-sm border-l-4 border-blue-500">
                    <p class="font-bold">${val.toUpperCase()} BARAT</p>
                    <p class="text-blue-300">Kode: 40124</p>
                </div>
            `;
        });
    </script>
</body>
</html>
